<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1E1E1E" />
    <meta name="description" content="Fluxa AI — Your intelligent chat assistant powered by Gemini" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Fluxa AI</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Tailwind CSS Play CDN
      ─────────────────────
      react-scripts 3.x uses PostCSS 7 internally which is incompatible with
      Tailwind v4. The Play CDN is the correct zero-config solution: it compiles
      all Tailwind classes (including arbitrary values like bg-[#2DA8D4]) in the
      browser at runtime, so no build-tool integration is needed at all.
    -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind config: mirrors tailwind.config.js so custom tokens work in JSX -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'ui-monospace', 'monospace'],
            },
            colors: {
              primary:  '#8B5CF6',
              purple: {
                400: '#A78BFA',
                500: '#8B5CF6',
                600: '#7C3AED',
                700: '#6D28D9',
                900: '#4C1D95',
              },
              dark: {
                DEFAULT: '#08080F',
                sidebar: '#0E0C1A',
                card:    '#16142A',
                hover:   '#211F32',
              },
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.3s ease-out',
            },
            keyframes: {
              fadeIn:  { from: { opacity: 0 }, to: { opacity: 1 } },
              slideUp: { from: { opacity: 0, transform: 'translateY(10px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            },
            backgroundImage: {
              'gradient-purple': 'linear-gradient(135deg, #7C3AED 0%, #9333EA 50%, #C026D3 100%)',
            },
          },
        },
      };
    </script>

    <style>
      /* Apply Inter font globally */
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Remove default margin/padding */
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Fluxa AI.</noscript>
    <div id="root"></div>
  </body>
</html>
